apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-top-exporter
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: k8s-top-exporter
  template:
    metadata:
      labels:
        app: k8s-top-exporter
    spec:
      serviceAccountName: k8s-top-exporter
      containers:
      - name: k8s-top-exporter
        image: ghcr.io/jmnote/k8s-top-exporter:v0.1.3
        resources:
          requests:
            memory: "32Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 9977
